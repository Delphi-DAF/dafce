<style>
a[aria-label="English"], a[aria-label="Español"] { opacity: 0.45; }
.lang-active { opacity: 1 !important; font-weight: bold; }
</style>
<script>
(function () {
  var p = window.location.pathname;
  var isEs = p.indexOf('/es/') !== -1 || p.endsWith('/es') || p.endsWith('/es/') || p.endsWith('/es/index.html');

  window.langSwitch = function (lang) {
    var p = window.location.pathname;
    if (lang === 'es') {
      if (p.indexOf('/es/') === -1 && !p.endsWith('/es/') && !p.endsWith('/es')) {
        var m = p.match(/^(.*?)(\/(?:modules|docs|blog|about|index)[^]*)$/);
        window.location.pathname = m ? m[1] + '/es' + m[2] : p.replace(/\/?$/, '/es/index.html');
      }
    } else {
      if (p.indexOf('/es/') !== -1) {
        window.location.pathname = p.replace('/es/', '/');
      }
    }
  };

  document.addEventListener('DOMContentLoaded', function () {
    // Mark active language button in navbar
    var btnEn = document.querySelector('a[aria-label="English"]');
    var btnEs = document.querySelector('a[aria-label="Español"]');
    if (isEs) {
      if (btnEs) btnEs.classList.add('lang-active');
    } else {
      if (btnEn) btnEn.classList.add('lang-active');
    }

    // Hide the '🌍 Language: ...' badges from included README files
    document.querySelectorAll('p').forEach(function (el) {
      if (el.innerText && el.innerText.trim().match(/^🌍/)) el.style.display = 'none';
    });
  });
}());
</script>
