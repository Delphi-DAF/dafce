<style>
a[aria-label="English"], a[aria-label="Español"] { opacity: 0.45; }
.lang-active { opacity: 1 !important; font-weight: bold; }
</style>
<script>
(function () {
  var p = window.location.pathname;
  var isEs = p.indexOf('/es/') !== -1;
  var isEn = p.indexOf('/en/') !== -1;

  window.langSwitch = function (lang) {
    var p = window.location.pathname;
    if (lang === 'es') {
      window.location.pathname = p.indexOf('/en/') !== -1
        ? p.replace('/en/', '/es/')
        : '/es/index.html';
    } else {
      window.location.pathname = p.indexOf('/es/') !== -1
        ? p.replace('/es/', '/en/')
        : '/en/index.html';
    }
  };

  document.addEventListener('DOMContentLoaded', function () {
    var btnEn = document.querySelector('a[aria-label="English"]');
    var btnEs = document.querySelector('a[aria-label="Español"]');

    if (btnEn) {
      btnEn.addEventListener('click', function (e) { e.preventDefault(); langSwitch('en'); });
      if (isEn || !isEs) btnEn.classList.add('lang-active');
    }
    if (btnEs) {
      btnEs.addEventListener('click', function (e) { e.preventDefault(); langSwitch('es'); });
      if (isEs) btnEs.classList.add('lang-active');
    }

    document.querySelectorAll('p').forEach(function (el) {
      if (el.innerText && el.innerText.trim().match(/^🌍/)) el.style.display = 'none';
    });
  });
}());
</script>
